<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <!-- Orange → teal gradient for the M mark -->
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F77F00"/>
      <stop offset="100%" stop-color="#2EC4B6"/>
    </linearGradient>
    <!-- Subtle glow behind the M -->
    <filter id="mGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="520" height="160" fill="#0C3D4A"/>

  <!-- ── Letter-mark badge (subtle glass inset) ── -->
  <rect x="18" y="16" width="118" height="128" rx="14"
        fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- ── Decorative corner nodes (tech feel) ── -->
  <circle cx="24"  cy="22"  r="3" fill="rgba(247,127,0,0.55)"/>
  <circle cx="130" cy="22"  r="3" fill="rgba(46,196,182,0.55)"/>
  <circle cx="24"  cy="138" r="3" fill="rgba(46,196,182,0.55)"/>
  <circle cx="130" cy="138" r="3" fill="rgba(247,127,0,0.55)"/>

  <!-- ── M letter mark ── -->
  <!-- Bold geometric M: two legs, two diagonals meeting at a V -->
  <polyline
    points="36,132  36,36  77,80  118,36  118,132"
    fill="none"
    stroke="url(#mGrad)"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#mGlow)"
  />

  <!-- ── Vertical divider ── -->
  <line x1="152" y1="20" x2="152" y2="140"
        stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <!-- ── MGT main wordmark ── -->
  <text
    x="170" y="107"
    font-family="'Arial Black','Franklin Gothic Heavy','Impact',Arial,sans-serif"
    font-size="74"
    font-weight="900"
    fill="#FFFFFF"
    letter-spacing="-2"
  >MGT</text>

  <!-- ── Ubuntu in Tech subtitle ── -->
  <text
    x="173" y="132"
    font-family="Arial,'Helvetica Neue',Helvetica,sans-serif"
    font-size="13.5"
    font-weight="400"
    fill="rgba(190,225,232,0.70)"
    letter-spacing="5.2"
  >UBUNTU IN TECH</text>
</svg>
